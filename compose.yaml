services:
  db:
    image: postgres:16
    ports: 
      - "5433:5432"
    environment:
      POSTGRES_DB: urlshortener
      POSTGRES_USER: legend
      POSTGRES_PASSWORD: "9874"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  redis:
      image: docker.io/library/redis:7-alpine
      container_name: urlshortener_redis
      ports:
        - "6380:6379"
      volumes:
        - redis_data:/data

volumes:
  postgres_data:
  redis_data: