services:
  db:
    image: postgres:16
    ports: 
      - "5433:5432"
    environment:
      POSTGRES_DB: urlshortener
      POSTGRES_USER: legend
      POSTGRES_PASSWORD: "9874"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  redis:
      image: docker.io/library/redis:7-alpine
      container_name: urlshortener_redis
      ports:
        - "6380:6379"
      volumes:
        - redis_data:/data

  app:
      build: .
      ports:
        - "8080:8080"
      depends_on:
        - db
        - redis
      environment:
        - REDIS_URL=redis://redis:6379/0
        - DB_URL=postgres://legend:9874@db:5432/urlshortener?sslmode=disable

volumes:
  postgres_data:
  redis_data: